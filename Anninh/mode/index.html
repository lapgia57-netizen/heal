<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hành Trình - Lộ Trình Chuyến Đi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }

        /* Login */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: #2a2a4a;
            padding: 30px 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #00ffcc; }

        /* Main Content */
        #mainContent { display: none; }
        h1 { text-align: center; margin: 20px 0; color: #00ffcc; }
        
        .section {
            background: rgba(255,255,255,0.08);
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
        }
        .section h2 {
            color: #00d4ff;
            margin-bottom: 10px;
            border-bottom: 1px solid #00d4ff33;
            padding-bottom: 5px;
        }

        #log {
            height: 320px;
            overflow-y: auto;
            background: #1a1a2e;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .item {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }

        .timestamp { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>🔑 Đăng nhập Admin</h2>
            <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="off">
            <br>
            <button onclick="login()">Đăng nhập</button>
            <p id="loginError" style="color: #ff4444; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent">
        <h1>📍 Lộ Trình Chuyến Đi</h1>
        
        <div class="section">
            <h2>📦 Thông tin món đồ đã lấy</h2>
            <div id="itemsLog"></div>
        </div>

        <div class="section">
            <h2>📌 Tương tác & Điểm chạm</h2>
            <button onclick="clearLog()">Xóa log tương tác</button>
            <button onclick="viewFirebase()">Xem dữ liệu Firebase</button>
            <div id="log"></div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://lotrinhchuyendi-default-rtdb.europe-west1.firebasedatabase.app/interactions.json";
        let isLoggedIn = false;

        // ====================== LOGIN ======================
        function login() {
            const pass = document.getElementById('password').value;
            if (pass === "123456") {
                isLoggedIn = true;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                addInteraction('admin_login', { message: "Đăng nhập admin thành công" });
            } else {
                document.getElementById('loginError').textContent = "❌ Mật khẩu sai!";
                setTimeout(() => {
                    document.getElementById('loginError').textContent = "";
                }, 2000);
            }
        }

        // ====================== GỬI DỮ LIỆU LÊN FIREBASE ======================
        function addInteraction(type, details) {
            if (!isLoggedIn && type !== 'page_load') return;

            const timestamp = new Date().toISOString();
            const data = {
                type: type,
                timestamp: timestamp,
                ...details,
                userAgent: navigator.userAgent,
                platform: navigator.platform
            };

            // Hiển thị trên màn hình
            showOnScreen(type, details, timestamp);

            // Gửi lên Firebase
            fetch(FIREBASE_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).catch(err => console.error("Lỗi Firebase:", err));
        }

        function showOnScreen(type, details, timestamp) {
            const timeStr = timestamp.slice(11, 19);

            if (type === "item_taken") {
                const itemsDiv = document.getElementById('itemsLog');
                const itemHTML = `
                    <div class="item">
                        <strong>📦 Món đồ:</strong> ${details.itemName}<br>
                        <span class="timestamp">${timeStr}</span> - 
                        ${details.note ? 'Ghi chú: ' + details.note : ''}
                    </div>`;
                itemsDiv.innerHTML += itemHTML;
                itemsDiv.scrollTop = itemsDiv.scrollHeight;
            } 
            else {
                const logDiv = document.getElementById('log');
                const entry = document.createElement('div');
                entry.innerHTML = `<span class="timestamp">[${timeStr}]</span> <strong>${type}</strong> → ${JSON.stringify(details)}`;
                logDiv.appendChild(entry);
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        }

        // ====================== CÁC SỰ KIỆN TƯƠNG TÁC ======================
        document.addEventListener('click', (e) => {
            addInteraction('click', {
                x: Math.round(e.clientX),
                y: Math.round(e.clientY),
                target: e.target.tagName
            });
        });

        document.addEventListener('touchstart', (e) => {
            for (let touch of e.touches) {
                addInteraction('touchstart', {
                    x: Math.round(touch.clientX),
                    y: Math.round(touch.clientY)
                });
            }
        });

        // ====================== THÊM MÓN ĐỒ ======================
        function addItem(itemName, note = "") {
            addInteraction('item_taken', {
                itemName: itemName,
                note: note
            });
        }

        // ====================== NÚT CHỨC NĂNG ======================
        function clearLog() {
            if (confirm("Xóa hết log tương tác?")) {
                document.getElementById('log').innerHTML = '';
            }
        }

        function viewFirebase() {
            window.open("https://lotrinhchuyendi-default-rtdb.europe-west1.firebasedatabase.app/interactions.json", "_blank");
        }

        // ====================== KHỞI ĐỘNG ======================
        window.onload = () => {
            console.log("Trang quản lý lộ trình đã sẵn sàng!");
        };

        // ====================== CÁCH SỬ DỤNG THÊM MÓN ĐỒ ======================
        // Bạn có thể gọi hàm này từ bất kỳ đâu (ví dụ nút bấm hoặc form)
        // Ví dụ:
        // addItem("Kiếm Truy Hồn", "Lấy lúc 14:30 ở rừng");
        // addItem("Giày Kiên Cường", "Mua ở cửa hàng");
    </script>
</body>
</html>
