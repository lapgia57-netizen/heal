<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tem niêm phong</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">
            <i class="fas fa-ticket-alt mr-2"></i>Quản lý tem niêm phong
        </h1>

        <!-- Form nhập tem mới -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Thêm tem mới</h2>
            <div class="flex gap-4">
                <input type="text" id="temNumber" placeholder="Nhập số tem..." 
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="addTem()" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition duration-200 flex items-center gap-2">
                    <i class="fas fa-plus"></i>Thêm
                </button>
            </div>
        </div>

        <!-- Bộ lọc -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="flex gap-4 items-center">
                <span class="text-gray-600 font-medium">Lọc:</span>
                <button onclick="filterTems('all')" id="filterAll" 
                    class="filter-btn px-4 py-2 rounded-lg bg-blue-500 text-white transition duration-200">
                    Tất cả
                </button>
                <button onclick="filterTems('used')" id="filterUsed" 
                    class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition duration-200">
                    Đã sử dụng
                </button>
                <button onclick="filterTems('unused')" id="filterUnused" 
                    class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition duration-200">
                    Chưa sử dụng
                </button>
            </div>
        </div>

        <!-- Danh sách tem -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Danh sách tem</h2>
            <div id="temList" class="space-y-2">
                <!-- Danh sách sẽ được load ở đây -->
            </div>
        </div>
    </div>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            databaseURL: "https://bankvanhungbian-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const temRef = database.ref('tems');

        let currentFilter = 'all';

        // Hàm thêm tem mới
        function addTem() {
            const temNumber = document.getElementById('temNumber').value.trim();
            
            if (temNumber === '') {
                alert('Vui lòng nhập số tem!');
                return;
            }

            // Kiểm tra tem đã tồn tại
            temRef.orderByChild('number').equalTo(temNumber).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    alert('Số tem này đã tồn tại!');
                    return;
                }

                // Thêm tem mới
                const newTem = {
                    number: temNumber,
                    used: false,
                    createdAt: new Date().toISOString(),
                    usedAt: null
                };

                temRef.push(newTem)
                    .then(() => {
                        document.getElementById('temNumber').value = '';
                        loadTems();
                    })
                    .catch(error => {
                        console.error('Lỗi khi thêm tem:', error);
                        alert('Có lỗi xảy ra khi thêm tem!');
                    });
            });
        }

        // Hàm cập nhật trạng thái sử dụng
        function toggleUsed(temId, currentStatus) {
            const updates = {
                used: !currentStatus,
                usedAt: !currentStatus ? new Date().toISOString() : null
            };

            temRef.child(temId).update(updates)
                .then(() => {
                    loadTems();
                })
                .catch(error => {
                    console.error('Lỗi khi cập nhật:', error);
                    alert('Có lỗi xảy ra khi cập nhật!');
                });
        }

        // Hàm xóa tem
        function deleteTem(temId) {
            if (confirm('Bạn có chắc muốn xóa tem này?')) {
                temRef.child(temId).remove()
                    .then(() => {
                        loadTems();
                    })
                    .catch(error => {
                        console.error('Lỗi khi xóa:', error);
                        alert('Có lỗi xảy ra khi xóa!');
                    });
            }
        }

        // Hàm lọc tem
        function filterTems(filter) {
            currentFilter = filter;
            
            // Cập nhật style cho các nút filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white');
                btn.classList.add('bg-gray-200', 'hover:bg-gray-300');
            });
            
            const activeBtn = filter === 'all' ? document.getElementById('filterAll') : 
                            filter === 'used' ? document.getElementById('filterUsed') : 
                            document.getElementById('filterUnused');
            activeBtn.classList.remove('bg-gray-200', 'hover:bg-gray-300');
            activeBtn.classList.add('bg-blue-500', 'text-white');
            
            loadTems();
        }

        // Hàm load danh sách tem
        function loadTems() {
            temRef.orderByChild('createdAt').once('value', (snapshot) => {
                const tems = [];
                snapshot.forEach(childSnapshot => {
                    tems.push({
                        id: childSnapshot.key,
                        ...childSnapshot.val()
                    });
                });

                // Đảo ngược để hiển thị mới nhất lên đầu
                tems.reverse();

                // Lọc theo trạng thái
                let filteredTems = tems;
                if (currentFilter === 'used') {
                    filteredTems = tems.filter(tem => tem.used);
                } else if (currentFilter === 'unused') {
                    filteredTems = tems.filter(tem => !tem.used);
                }

                displayTems(filteredTems);
            });
        }

        // Hàm hiển thị danh sách tem
        function displayTems(tems) {
            const temList = document.getElementById('temList');
            
            if (tems.length === 0) {
                temList.innerHTML = '<p class="text-center text-gray-500 py-4">Không có tem nào</p>';
                return;
            }

            temList.innerHTML = tems.map(tem => `
                <div class="flex items-center justify-between p-4 border rounded-lg hover:bg-gray-50 transition duration-200 ${tem.used ? 'bg-gray-50' : ''}">
                    <div class="flex items-center gap-4">
                        <i class="fas ${tem.used ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-400'}"></i>
                        <div>
                            <span class="font-medium text-lg">${tem.number}</span>
                            <div class="text-sm text-gray-500">
                                ${tem.used ? 
                                    `<span class="text-green-600">Đã sử dụng: ${new Date(tem.usedAt).toLocaleString('vi-VN')}</span>` : 
                                    '<span class="text-gray-500">Chưa sử dụng</span>'}
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleUsed('${tem.id}', ${tem.used})" 
                            class="px-3 py-1 rounded-lg ${tem.used ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-green-500 hover:bg-green-600'} text-white transition duration-200 text-sm">
                            <i class="fas ${tem.used ? 'fa-undo' : 'fa-check'} mr-1"></i>
                            ${tem.used ? 'Hoàn tác' : 'Sử dụng'}
                        </button>
                        <button onclick="deleteTem('${tem.id}')" 
                            class="px-3 py-1 rounded-lg bg-red-500 hover:bg-red-600 text-white transition duration-200 text-sm">
                            <i class="fas fa-trash mr-1"></i>Xóa
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Load dữ liệu khi trang được tải
        window.onload = () => {
            loadTems();
        };
    </script>
</body>
</html>
