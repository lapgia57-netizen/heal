<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý Thu Chi</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 12px; color: #333; }
    
    #loginOverlay {
      position: fixed; inset: 0; background: linear-gradient(135deg, #1b5e20, #2e7d32);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .login-box {
      background: white; padding: 32px 24px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      width: 100%; max-width: 360px; text-align: center;
    }
    .logo { font-size: 3.5em; margin-bottom: 12px; }

    #app { display: none; }
    #app.visible { display: block; }

    .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .header-row { padding: 16px 20px; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center; }
    .balance-area { padding: 20px 16px; background: linear-gradient(135deg, #4caf50, #66bb6a); color: white; text-align: center; }
    .balance-main { font-size: 1.9em; font-weight: bold; margin: 8px 0; }

    .tabs { display: flex; margin: 16px; background: #f1f1f1; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; padding: 14px; text-align: center; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .tab.active { background: #2e7d32; color: white; }

    form { padding: 0 16px 24px; display: grid; gap: 16px; }
    label { font-weight: 600; margin-bottom: 6px; display: block; }
    input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 1em; }
    .main-btn { padding: 16px; font-size: 1.1em; font-weight: bold; background: #2e7d32; color: white; border: none; border-radius: 12px; }

    #list { padding: 0 16px 20px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .filter-btn.active { background: #2e7d32; color: white; }

    .item {
      background: #f9f9f9; padding: 16px; border-radius: 12px; margin-bottom: 12px;
      border-left: 6px solid #4caf50;
    }
    .item.thu { border-left-color: #2e7d32; }
    .item.chi { border-left-color: #d32f2f; }
    .amount { font-size: 1.35em; font-weight: bold; }
    .desc { margin: 6px 0; font-size: 1.05em; }
    .meta { font-size: 0.85em; color: #555; }
    .node-id { font-size: 0.78em; color: #888; font-family: monospace; margin-top: 8px; }

    .pagination { text-align: center; margin: 24px 0; }
    .pagination button { padding: 10px 16px; margin: 0 4px; border: 1px solid #ddd; border-radius: 8px; }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="logo">💰</div>
    <h2>Quản lý Thu Chi</h2>
    <p>Vui lòng đăng nhập</p>
    <input type="text" id="loginUsername" value="captain" placeholder="Tên đăng nhập" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;"><br>
    <input type="password" id="loginPassword" value="topgame98" placeholder="Mật khẩu" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
    <button id="loginBtn" style="width:100%; padding:14px; margin-top:12px; background:#2e7d32; color:white; border:none; border-radius:12px; font-weight:bold;">Đăng nhập</button>
    <div id="loginError" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<div id="app">
  <div class="container">
    <div class="header-row">
      <h1>📒 Thu Chi Hàng Ngày</h1>
      <button id="logoutBtn" style="background:#f44336;color:white;border:none;padding:8px 14px;border-radius:8px;">Đăng xuất</button>
    </div>

    <div class="balance-area">
      <div>Số dư hiện tại</div>
      <div class="balance-main" id="currentBalance">0 ₫</div>
      <div>Thu: <span id="totalThu">0</span> | Chi: <span id="totalChi">0</span></div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="thu">➕ THU</div>
      <div class="tab" data-tab="chi">➖ CHI</div>
    </div>

    <form id="incomeForm">
      <div><label>Ngày</label><input type="date" id="ngay_thu" required></div>
      <div><label>Mô tả</label><input type="text" id="mo_ta_thu" required></div>
      <div><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_thu" class="money-input" required></div>
      <div><label>Danh mục</label><select id="danh_muc_thu" required></select></div>
      <div><label>Ghi chú</label><textarea id="ghi_chu_thu" rows="2"></textarea></div>
      <button type="submit" class="main-btn">Lưu khoản THU</button>
    </form>

    <form id="expenseForm" class="hidden">
      <div><label>Ngày</label><input type="date" id="ngay_chi" required></div>
      <div><label>Mô tả</label><input type="text" id="mo_ta_chi" required></div>
      <div><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_chi" class="money-input" required></div>
      <div><label>Danh mục</label><select id="danh_muc_chi" required></select></div>
      <div><label>Ghi chú</label><textarea id="ghi_chu_chi" rows="2"></textarea></div>
      <button type="submit" class="main-btn">Lưu khoản CHI</button>
    </form>

    <div id="list">
      <h3 style="padding:0 16px 8px;">📋 Lịch sử giao dịch</h3>
      <div class="filter-tabs" style="padding:0 16px;">
        <button class="filter-btn active" data-filter="all">Tất cả</button>
        <button class="filter-btn" data-filter="thu">Thu</button>
        <button class="filter-btn" data-filter="chi">Chi</button>
      </div>
      <div id="loading">Đang tải...</div>
      <div id="records"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </div>
</div>

<script>
let firebaseInitialized = false;
let allRecords = [];
let currentFilter = 'all';
let currentPage = 1;
const ITEMS_PER_PAGE = 15;
let isUpdating = false;
let updateTimeout = null;

const ACCOUNTS = { captain: 'topgame98' };

// Login
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('logoutBtn').addEventListener('click', () => location.reload());

function doLogin() {
  const user = document.getElementById('loginUsername').value.trim().toLowerCase();
  const pass = document.getElementById('loginPassword').value;
  if (ACCOUNTS[user] === pass) {
    sessionStorage.setItem('loggedInUser', user);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initFirebase();
  } else {
    document.getElementById('loginError').textContent = 'Sai thông tin!';
  }
}

// Auto login
if (sessionStorage.getItem('loggedInUser') === 'captain') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  initFirebase();
}

function initFirebase() {
  if (firebaseInitialized) return;
  firebaseInitialized = true;

  const firebaseConfig = { databaseURL: "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const thuRef = firebase.database().ref('thu-nhap');
  const chiRef = firebase.database().ref('chi-tieu');

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('ngay_thu').value = today;
  document.getElementById('ngay_chi').value = today;

  // Tab & Filter setup (giữ nguyên như trước)
  document.querySelectorAll('.tab, .filter-btn').forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('incomeForm').classList.toggle('hidden', el.dataset.tab !== 'thu');
        document.getElementById('expenseForm').classList.toggle('hidden', el.dataset.tab !== 'chi');
      } else {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        currentFilter = el.dataset.filter;
        currentPage = 1;
        renderRecords();
      }
    });
  });

  // Money format
  document.querySelectorAll('.money-input').forEach(input => {
    input.addEventListener('input', () => {
      let val = input.value.replace(/\D/g, '');
      input.value = val ? Number(val).toLocaleString('vi-VN') : '';
    });
  });

  // Submit forms
  document.getElementById('incomeForm').addEventListener('submit', e => submitForm(e, thuRef, 'thu'));
  document.getElementById('expenseForm').addEventListener('submit', e => submitForm(e, chiRef, 'chi'));

  function submitForm(e, ref, type) {
    e.preventDefault();
    const form = e.target;
    const raw = form.querySelector('.money-input').value.replace(/\./g, '');
    ref.push({
      ngay: form.querySelector('input[type="date"]').value,
      mo_ta: form.querySelector('input[type="text"]').value.trim(),
      so_tien: Number(raw),
      danh_muc: form.querySelector('select').value,
      ghi_chu: form.querySelector('textarea').value.trim() || null,
      thoi_gian: firebase.database.ServerValue.TIMESTAMP,
      loai: type
    }).then(() => {
      alert(type === 'thu' ? '✅ Lưu khoản THU thành công' : '✅ Lưu khoản CHI thành công');
      form.reset();
      form.querySelector('input[type="date"]').value = today;
    });
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
  }

  function debounceUpdate() {
    clearTimeout(updateTimeout);
    updateTimeout = setTimeout(updateUI, 300);
  }

  function updateUI() {
    if (isUpdating) return;
    isUpdating = true;
    document.getElementById('loading').style.display = 'block';

    Promise.all([thuRef.once('value'), chiRef.once('value')]).then(([thuSnap, chiSnap]) => {
      allRecords = [];

      thuSnap.forEach(s => allRecords.push({ id: s.key, ...s.val(), loai: 'thu' }));
      chiSnap.forEach(s => allRecords.push({ id: s.key, ...s.val(), loai: 'chi' }));

      const totalThu = allRecords.filter(r => r.loai === 'thu').reduce((s, r) => s + (r.so_tien||0), 0);
      const totalChi = allRecords.filter(r => r.loai === 'chi').reduce((s, r) => s + (r.so_tien||0), 0);
      const balance = totalThu - totalChi;

      document.getElementById('currentBalance').textContent = balance.toLocaleString('vi-VN') + ' ₫';
      document.getElementById('totalThu').textContent = totalThu.toLocaleString('vi-VN');
      document.getElementById('totalChi').textContent = totalChi.toLocaleString('vi-VN');

      allRecords.sort((a, b) => (b.thoi_gian || 0) - (a.thoi_gian || 0));

      currentPage = 1;
      renderRecords();
      document.getElementById('loading').style.display = 'none';
      isUpdating = false;
    }).catch(() => { isUpdating = false; });
  }

  function renderRecords() {
    const container = document.getElementById('records');
    container.innerHTML = '';

    let filtered = allRecords;
    if (currentFilter === 'thu') filtered = allRecords.filter(r => r.loai === 'thu');
    if (currentFilter === 'chi') filtered = allRecords.filter(r => r.loai === 'chi');

    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    pageItems.forEach(item => {
      const div = document.createElement('div');
      div.className = `item ${item.loai}`;
      const sign = item.loai === 'thu' ? '+' : '-';
      const color = item.loai === 'thu' ? '#2e7d32' : '#d32f2f';

      div.innerHTML = `
        <div class="amount" style="color:${color}">${sign} ${Number(item.so_tien).toLocaleString('vi-VN')} ₫</div>
        <div class="desc">${item.mo_ta}</div>
        <div class="meta">${formatDate(item.thoi_gian)} • ${item.danh_muc || 'Khác'}</div>
        <div class="node-id">ID: ${item.id}</div>
      `;
      container.appendChild(div);
    });

    renderPagination(filtered.length);
  }

  window.changePage = (page) => {
    if (page < 1) return;
    currentPage = page;
    renderRecords();
  };

  function renderPagination(total) {
    const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
    let html = '';
    if (totalPages > 1) {
      html += `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Trước</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (Math.abs(i - currentPage) <= 2 || i === 1 || i === totalPages) {
          html += i === currentPage ? `<strong>${i}</strong>` : `<button onclick="changePage(${i})">${i}</button>`;
        }
      }
      html += `<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Sau →</button>`;
    }
    document.getElementById('pagination').innerHTML = html;
  }

  // Realtime listeners (đã debounce)
  thuRef.on('value', debounceUpdate);
  chiRef.on('value', debounceUpdate);

  // Load ban đầu
  updateUI();
}
</script>
</body>
</html>
