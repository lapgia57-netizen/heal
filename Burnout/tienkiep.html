<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý Thu Chi</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: #f0f4f8; 
      margin: 0; 
      padding: 12px; 
      color: #333; 
    }

    /* LOGIN */
    #loginOverlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: white;
      padding: 32px 24px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .logo { font-size: 3.5em; margin-bottom: 12px; }
    #loginBtn {
      width: 100%; padding: 16px; font-size: 1.1em; font-weight: bold;
      background: #2e7d32; color: white; border: none; border-radius: 12px;
    }

    /* APP */
    #app { display: none; }
    #app.visible { display: block; }

    .container { 
      max-width: 720px; margin: 0 auto; background: white; 
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header-row { 
      padding: 16px 20px; background: #f8f9fa; 
      display: flex; justify-content: space-between; align-items: center;
    }
    h1 { margin: 0; color: #1b5e20; font-size: 1.4em; }

    .balance-area {
      padding: 20px 16px;
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      color: white;
      text-align: center;
    }
    .balance-main { font-size: 1.9em; font-weight: bold; margin: 8px 0; }
    .balance-detail { font-size: 0.95em; opacity: 0.95; }

    .tabs { display: flex; margin: 16px; background: #f1f1f1; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; padding: 14px; text-align: center; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .tab.active { background: #2e7d32; color: white; }

    form { padding: 0 16px 24px; display: grid; gap: 16px; }
    label { font-weight: 600; margin-bottom: 6px; display: block; }
    input, select, textarea { 
      width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 1em;
    }
    .main-btn { 
      padding: 16px; font-size: 1.1em; font-weight: bold; 
      background: #2e7d32; color: white; border: none; border-radius: 12px; 
    }

    #list { padding: 0 16px 20px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
    }
    .filter-btn.active { background: #2e7d32; color: white; }

    .item {
      background: #f9f9f9;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 6px solid #4caf50;
    }
    .item.thu { border-left-color: #2e7d32; }
    .item.chi { border-left-color: #d32f2f; }

    .amount { font-size: 1.35em; font-weight: bold; }
    .desc { margin: 6px 0; font-size: 1.05em; }
    .meta { font-size: 0.85em; color: #555; }
    .node-id { font-size: 0.78em; color: #888; font-family: monospace; margin-top: 8px; }

    .pagination { text-align: center; margin: 24px 0; }
    .pagination button {
      padding: 10px 16px; margin: 0 4px; border: 1px solid #ddd; border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="logo">💰</div>
    <h2>Quản lý Thu Chi</h2>
    <p>Vui lòng đăng nhập để tiếp tục</p>
    <div class="login-field"><label>Tên đăng nhập</label><input type="text" id="loginUsername" value="captain"></div>
    <div class="login-field"><label>Mật khẩu</label><input type="password" id="loginPassword" value="topgame98"></div>
    <button id="loginBtn">Đăng nhập</button>
    <div id="loginError" style="color:red; margin-top:12px;"></div>
  </div>
</div>

<div id="app">
  <div class="container">
    <div class="header-row">
      <h1>📒 Thu Chi Hàng Ngày</h1>
      <button id="logoutBtn" style="background:#f44336;color:white;border:none;padding:8px 14px;border-radius:8px;">Đăng xuất</button>
    </div>

    <div class="balance-area">
      <div>Số dư hiện tại</div>
      <div class="balance-main" id="currentBalance">0 ₫</div>
      <div class="balance-detail">
        Thu: <span id="totalThu">0</span> &nbsp; | &nbsp; 
        Chi: <span id="totalChi">0</span>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="thu">➕ THU</div>
      <div class="tab" data-tab="chi">➖ CHI</div>
    </div>

    <!-- Form THU -->
    <form id="incomeForm">
      <div><label>Ngày</label><input type="date" id="ngay_thu" required></div>
      <div><label>Mô tả khoản thu</label><input type="text" id="mo_ta_thu" placeholder="Lương, thưởng..." required></div>
      <div><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_thu" placeholder="1.500.000" required class="money-input"></div>
      <div><label>Danh mục</label><select id="danh_muc_thu" required>
        <option value="">Chọn danh mục</option>
        <option value="Lương">Lương / Thưởng</option>
        <option value="Trợ cấp">Trợ cấp</option>
        <option value="Kinh doanh">Kinh doanh</option>
        <option value="Đầu tư">Đầu tư</option>
        <option value="Khác">Khác</option>
      </select></div>
      <div><label>Ghi chú</label><textarea id="ghi_chu_thu" rows="2"></textarea></div>
      <button type="submit" class="main-btn">Lưu khoản THU</button>
    </form>

    <!-- Form CHI -->
    <form id="expenseForm" class="hidden">
      <div><label>Ngày</label><input type="date" id="ngay_chi" required></div>
      <div><label>Mô tả khoản chi</label><input type="text" id="mo_ta_chi" placeholder="Ăn uống, xăng xe..." required></div>
      <div><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_chi" placeholder="65.000" required class="money-input"></div>
      <div><label>Danh mục</label><select id="danh_muc_chi" required>
        <option value="">Chọn danh mục</option>
        <option value="Ăn uống">Ăn uống</option>
        <option value="Đi lại">Đi lại / Xăng</option>
        <option value="Mua sắm">Mua sắm</option>
        <option value="Giải trí">Giải trí</option>
        <option value="Khác">Khác</option>
      </select></div>
      <div><label>Ghi chú</label><textarea id="ghi_chu_chi" rows="2"></textarea></div>
      <button type="submit" class="main-btn">Lưu khoản CHI</button>
    </form>

    <div id="list">
      <h3 style="padding:0 16px 8px; margin:0 0 12px;">📋 Lịch sử giao dịch</h3>
      
      <div class="filter-tabs" style="padding:0 16px;">
        <button class="filter-btn active" data-filter="all">Tất cả</button>
        <button class="filter-btn" data-filter="thu">Thu</button>
        <button class="filter-btn" data-filter="chi">Chi</button>
      </div>

      <div id="loading">Đang tải dữ liệu...</div>
      <div id="records"></div>
      <div id="pagination" class="pagination"></div>
      <div id="error" style="display:none; color:red; text-align:center; padding:20px;"></div>
    </div>
  </div>
</div>

<script>
// ====================== LOGIN ======================
const ACCOUNTS = { captain: 'topgame98' };

document.getElementById('loginBtn').addEventListener('click', () => {
  const user = document.getElementById('loginUsername').value.trim().toLowerCase();
  const pass = document.getElementById('loginPassword').value;
  if (ACCOUNTS[user] && ACCOUNTS[user] === pass) {
    sessionStorage.setItem('loggedInUser', user);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('usernameDisplay').textContent = user;
    initFirebase();
  } else {
    document.getElementById('loginError').textContent = 'Sai thông tin đăng nhập!';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => location.reload());

// Auto login
if (sessionStorage.getItem('loggedInUser') === 'captain') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  initFirebase();
}

// ====================== MAIN APP ======================
let allRecords = [];
let currentFilter = 'all';
let currentPage = 1;
const ITEMS_PER_PAGE = 15;

function initFirebase() {
  const firebaseConfig = { databaseURL: "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const thuRef = db.ref('thu-nhap');
  const chiRef = db.ref('chi-tieu');

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('ngay_thu').value = today;
  document.getElementById('ngay_chi').value = today;

  // Tab Thu / Chi
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('incomeForm').classList.toggle('hidden', tab.dataset.tab !== 'thu');
      document.getElementById('expenseForm').classList.toggle('hidden', tab.dataset.tab !== 'chi');
    });
  });

  // Filter
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      currentPage = 1;
      renderRecords();
    });
  });

  // Format money input
  document.querySelectorAll('.money-input').forEach(input => {
    input.addEventListener('input', () => {
      let val = input.value.replace(/\D/g, '');
      input.value = val ? Number(val).toLocaleString('vi-VN') : '';
    });
  });

  // Submit forms
  document.getElementById('incomeForm').addEventListener('submit', e => {
    e.preventDefault();
    const raw = document.getElementById('so_tien_thu').value.replace(/\./g, '');
    thuRef.push({
      ngay: document.getElementById('ngay_thu').value,
      mo_ta: document.getElementById('mo_ta_thu').value.trim(),
      so_tien: Number(raw),
      danh_muc: document.getElementById('danh_muc_thu').value,
      ghi_chu: document.getElementById('ghi_chu_thu').value.trim() || null,
      thoi_gian: firebase.database.ServerValue.TIMESTAMP,
      loai: 'thu'
    }).then(() => {
      alert('✅ Đã lưu khoản THU');
      e.target.reset();
      document.getElementById('ngay_thu').value = today;
    });
  });

  document.getElementById('expenseForm').addEventListener('submit', e => {
    e.preventDefault();
    const raw = document.getElementById('so_tien_chi').value.replace(/\./g, '');
    chiRef.push({
      ngay: document.getElementById('ngay_chi').value,
      mo_ta: document.getElementById('mo_ta_chi').value.trim(),
      so_tien: Number(raw),
      danh_muc: document.getElementById('danh_muc_chi').value,
      ghi_chu: document.getElementById('ghi_chu_chi').value.trim() || null,
      thoi_gian: firebase.database.ServerValue.TIMESTAMP,
      loai: 'chi'
    }).then(() => {
      alert('✅ Đã lưu khoản CHI');
      e.target.reset();
      document.getElementById('ngay_chi').value = today;
    });
  });

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
  }

  function renderPagination(total) {
    const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
    let html = '';
    if (totalPages > 1) {
      html += `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Trước</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) html += `<strong>${i}</strong>`;
        else if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2)
          html += `<button onclick="changePage(${i})">${i}</button>`;
      }
      html += `<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Sau →</button>`;
    }
    document.getElementById('pagination').innerHTML = html;
  }

  window.changePage = (page) => {
    currentPage = page;
    renderRecords();
  };

  function renderRecords() {
    const container = document.getElementById('records');
    container.innerHTML = '';

    let filtered = allRecords;
    if (currentFilter === 'thu') filtered = allRecords.filter(r => r.loai === 'thu');
    if (currentFilter === 'chi') filtered = allRecords.filter(r => r.loai === 'chi');

    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    pageItems.forEach(item => {
      const div = document.createElement('div');
      div.className = `item ${item.loai}`;
      const sign = item.loai === 'thu' ? '+' : '-';
      const color = item.loai === 'thu' ? '#2e7d32' : '#d32f2f';

      div.innerHTML = `
        <div class="amount" style="color:${color}">${sign} ${Number(item.so_tien).toLocaleString('vi-VN')} ₫</div>
        <div class="desc">${item.mo_ta}</div>
        <div class="meta">${formatDate(item.thoi_gian)} • ${item.danh_muc || 'Khác'} ${item.ghi_chu ? '• ' + item.ghi_chu : ''}</div>
        <div class="node-id">ID: ${item.id}</div>
      `;
      container.appendChild(div);
    });

    if (pageItems.length === 0) {
      container.innerHTML = `<p style="text-align:center;color:#777;padding:40px 0;">Chưa có giao dịch nào</p>`;
    }

    renderPagination(filtered.length);
  }

  // ====================== REAL-TIME DATA ======================
  function updateUI() {
    document.getElementById('loading').style.display = 'block';
    allRecords = [];

    Promise.all([thuRef.once('value'), chiRef.once('value')]).then(([thuSnap, chiSnap]) => {
      thuSnap.forEach(s => {
        allRecords.push({ id: s.key, ...s.val(), loai: 'thu' });
      });
      chiSnap.forEach(s => {
        allRecords.push({ id: s.key, ...s.val(), loai: 'chi' });
      });

      // Tính toán
      const totalThu = allRecords.filter(r => r.loai === 'thu').reduce((sum, r) => sum + (r.so_tien || 0), 0);
      const totalChi = allRecords.filter(r => r.loai === 'chi').reduce((sum, r) => sum + (r.so_tien || 0), 0);
      const balance = totalThu - totalChi;

      document.getElementById('currentBalance').textContent = balance.toLocaleString('vi-VN') + ' ₫';
      document.getElementById('totalThu').textContent = totalThu.toLocaleString('vi-VN');
      document.getElementById('totalChi').textContent = totalChi.toLocaleString('vi-VN');

      allRecords.sort((a, b) => (b.thoi_gian || 0) - (a.thoi_gian || 0));

      currentPage = 1;
      renderRecords();
      document.getElementById('loading').style.display = 'none';
    }).catch(err => {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Lỗi tải dữ liệu: ' + err.message;
    });
  }

  // Listen realtime (chỉ trigger update một lần)
  thuRef.on('value', updateUI);
  chiRef.on('value', updateUI);
}
</script>
</body>
</html>
